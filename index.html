<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claus Bornemann, Psykolog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background-color: #f5f1ec;
            color: #3a3a3a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        main {
            text-align: center;
            max-width: 600px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            margin-bottom: 2rem;
            color: #4a5a4a;
        }

        .divider {
            width: 60px;
            height: 1px;
            background-color: #b8a890;
            margin: 0 auto 2rem;
        }

        .name {
            font-size: 1.25rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            color: #5a5a5a;
        }

        .title {
            font-size: 1rem;
            font-style: italic;
            color: #8a8070;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <main>
        <h1>Siden er under opbygning</h1>
        <div class="divider"></div>
        <p class="name">Claus Bornemann</p>
        <p class="title">Psykolog</p>
    </main>
</body>
</html>
